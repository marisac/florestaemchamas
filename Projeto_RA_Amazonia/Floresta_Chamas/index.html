<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA - Floresta em Chamas</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
    }

    #overlay.hidden {
      display: none;
    }

    #start-button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #ff4757;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    #status {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 900;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>Floresta em Chamas</h1>
    <p>Toque para abrir a câmera. Depois, aponte o celular para o marcador da obra.</p>
    <button id="start-button">Iniciar experiência</button>
  </div>

  <div id="status">Aguardando início</div>

  <a-scene
    mindar-image="imageTargetSrc: ./alvoflorestachamas.mind; autoStart: false; uiLoading: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="video-floresta"
        src="./Florestachamas.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-floresta">
      <a-video
        src="#video-floresta"
        width="1"
        height="1.77"
        position="0 0 0"
        rotation="0 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const video = document.querySelector('#video-floresta');
    const startButton = document.querySelector('#start-button');
    const overlay = document.querySelector('#overlay');
    const status = document.querySelector('#status');
    const target = document.querySelector('#target-floresta');

    let started = false;

    const updateStatus = (text) => {
      status.textContent = text;
    };

    startButton.addEventListener('click', async () => {
      if (started) return;
      started = true;

      try {
        video.muted = true;
        await video.play();
        video.pause();
        video.currentTime = 0;

        await scene.systems['mindar-image-system'].start();
        overlay.classList.add('hidden');
        updateStatus('Câmera ativa. Aponte para o marcador');
      } catch (error) {
        started = false;
        updateStatus('Não foi possível iniciar a câmera');
        alert('Não foi possível iniciar a experiência. Verifique a permissão de câmera no navegador.');
        console.error(error);
      }
    });

    target.addEventListener('targetFound', async () => {
      updateStatus('Marcador encontrado');
      try {
        video.currentTime = 0;
        await video.play();
      } catch (error) {
        console.error('Erro ao reproduzir vídeo:', error);
      }
    });

    target.addEventListener('targetLost', () => {
      updateStatus('Marcador perdido. Aponte novamente para a obra');
      video.pause();
    });

    scene.addEventListener('renderstart', () => {
      updateStatus('Pronto para iniciar');
    });
  </script>
</body>
</html>
